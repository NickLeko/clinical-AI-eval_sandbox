name: Clinical AI Eval (Sandbox Run)

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider (openai or mock)"
        required: true
        default: "openai"
      model:
        description: "Model id (provider-specific)"
        required: true
        default: "gpt-4o"
      max_cases:
        description: "Max cases to run (cost control; may create a partial non-canonical run)"
        required: true
        default: "25"
      prompt_version:
        description: "Prompt version label"
        required: true
        default: "v1"
      run_id:
        description: "Explicit sandbox run identifier"
        required: true
        default: "sandbox_run"

permissions:
  contents: read

jobs:
  run-sandbox-eval:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONPATH: "."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m py_compile src/*.py tests/*.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Generate sandbox run
        run: |
          python src/generate_answers.py \
            --dataset dataset/clinical_questions.csv \
            --provider "${{ inputs.provider }}" \
            --model "${{ inputs.model }}" \
            --prompt-version "${{ inputs.prompt_version }}" \
            --run-id "${{ inputs.run_id }}" \
            --max-cases "${{ inputs.max_cases }}" \
            --results-dir sandbox_results \
            --run-kind sandbox

      - name: Evaluate sandbox run
        run: python src/run_evaluation.py --dataset dataset/clinical_questions.csv --results-dir sandbox_results

      - name: Summarize sandbox run
        run: python src/summarize_results.py --top-n 10 --results-dir sandbox_results

      - name: Upload sandbox artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-results-${{ inputs.run_id }}
          path: sandbox_results/
