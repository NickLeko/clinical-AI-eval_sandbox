name: Clinical AI Eval (Manual Benchmark Refresh)

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider (openai or mock)"
        required: true
        default: "openai"
      model:
        description: "Model id (provider-specific)"
        required: true
        default: "gpt-4o"
      max_cases:
        description: "Max cases to run (cost control)"
        required: true
        default: "25"
      prompt_version:
        description: "Prompt version label"
        required: true
        default: "v1"
      run_id:
        description: "Explicit benchmark run identifier"
        required: true
        default: "manual_refresh"

permissions:
  contents: write

jobs:
  run-eval:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONPATH: "."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate published run
        run: |
          python src/generate_answers.py \
            --dataset dataset/clinical_questions.csv \
            --provider "${{ inputs.provider }}" \
            --model "${{ inputs.model }}" \
            --prompt-version "${{ inputs.prompt_version }}" \
            --run-id "${{ inputs.run_id }}" \
            --max-cases "${{ inputs.max_cases }}"

      - name: Evaluate published run
        run: python src/run_evaluation.py --dataset dataset/clinical_questions.csv

      - name: Summarize published run
        run: python src/summarize_results.py --top-n 10

      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/*.jsonl results/*.csv results/*.md results/run_manifest.json results/cache/*.jsonl

          if git diff --cached --quiet; then
            echo "No result changes to commit."
            exit 0
          fi

          git commit -m "Refresh benchmark artifacts [skip ci]"
          git push
